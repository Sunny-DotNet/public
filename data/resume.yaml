sections:
  profile:
    title:
      zh-Hans: 个人简介
      en: Profile
      ja: プロフィール
      fr: Profil
    body:
      zh-Hans: |-
        高级 .NET 技术专家与开源开发者，拥有十余年工程经验。专注 C# 后端架构、NuGet SDK 库开发、分布式系统设计，同时具备大数据采集与检索、AI/大模型应用集成、物联网设备联动和 3D 场景展示的综合能力。曾主导省级重点工程与百万级数据平台交付，在 GitHub 维护 70+ 个公开仓库，并发布多个面向全球 .NET 开发者的开源 SDK。
      en: |-
        Senior .NET engineer and open-source contributor with over ten years of hands-on engineering experience. Specialized in C# backend architecture, NuGet SDK development, and distributed system design, with broad experience across big-data ingestion and retrieval, AI/LLM integration, IoT device orchestration, and 3D scene delivery. Led provincial key projects and million-scale data platforms, maintains 70+ public GitHub repositories, and publishes open-source SDKs for the global .NET community.
      ja: |-
        10 年以上の実務経験を持つシニア .NET エンジニア兼オープンソース開発者です。C# バックエンドアーキテクチャ、NuGet SDK 開発、分散システム設計を専門とし、大規模データ収集・検索、AI/LLM 連携、IoT デバイス制御、3D シーン表示まで幅広く対応できます。省級重点プロジェクトやミリオンスケールのデータ基盤を主導し、GitHub で 70 以上の公開リポジトリを管理し、グローバルな .NET 開発者向けに複数のオープンソース SDK を公開しています。
      fr: |-
        Ingénieur .NET senior et contributeur open source avec plus de dix ans d'expérience terrain. Spécialisé dans l'architecture backend C#, le développement de SDK NuGet et la conception de systèmes distribués, avec une expérience étendue en collecte et recherche de données massives, intégration IA/LLM, orchestration d'équipements IoT et rendu de scènes 3D. A piloté des projets provinciaux clés et des plateformes de données à l'échelle du million, maintient plus de 70 dépôts publics sur GitHub et publie plusieurs SDK open source pour la communauté .NET mondiale.

  strengths:
    title:
      zh-Hans: 技术优势与核心能力
      en: Strengths & Core Skills
      ja: 強みと主要スキル
      fr: Forces et compétences clés
    body:
      zh-Hans: |-
        - **.NET 生态深度实践**：精通 .NET 6/7/8/9/10、ABP Framework（DDD 分层、多租户、权限体系）、EF Core，主导微服务架构与模块化应用开发。
        - **NuGet SDK 库开发**：独立设计并发布多个高质量 .NET SDK，覆盖云服务、AI 模型、大数据解析等领域，遵循依赖注入、异步优先、多目标框架、多语言文档的工业级标准。
        - **AI 与大模型集成**：封装 DashScope.Net、CloudflareAI.DotNet 等 SDK；集成 dify、Ollama 本地大模型，应用于无人直播智能互动、内容生成与弹幕语义理解。
        - **分布式与高并发处理**：大数据采集、高并发分布式爬虫、Common Crawl 解析、MongoDB/Elasticsearch 百万级检索、异步管道、ETL 与聚合分析。
        - **工业级设备联动系统**：负责万平展厅及上百台设备中控，覆盖时钟同步、TCP/IP 与串口通信、复杂设备同步调度与容灾机制。
        - **前端与跨端开发**：熟悉 JavaScript/TypeScript、Vue 3、Blazor Server/WASM、THREE.JS 3D 场景渲染、UNI-APP 小程序、MAUI 跨平台桌面应用。
        - **嵌入式与机器人系统**：Arduino/ESP32 硬件驱动，结合 3D 打印与微机中控，实现多模块分布式协作与自动化。
        - **DevOps 与持续交付**：GitHub Actions CI/CD、Docker/Kubernetes 容器化部署、Selenium WebDriver 端到端测试、NuGet 自动发布流水线。
      en: |-
        - **Deep .NET ecosystem practice**: Expert in .NET 6/7/8/9/10, ABP Framework (DDD layering, multi-tenancy, permission systems), and EF Core; led microservice architectures and modular application development.
        - **NuGet SDK development**: Independently designed and published production-grade .NET SDKs for cloud services, AI models, and big-data parsing, following dependency injection, async-first APIs, multi-target frameworks, and multilingual documentation standards.
        - **AI & LLM integration**: Authored DashScope.Net and CloudflareAI.DotNet SDKs; integrated dify and Ollama local LLMs for intelligent unattended live-streaming interaction, content generation, and bullet-chat semantic understanding.
        - **Distributed & high-concurrency processing**: Large-scale data ingestion, high-concurrency distributed crawling, Common Crawl parsing, MongoDB/Elasticsearch million-scale search, async pipelines, ETL, and aggregate analysis.
        - **Industrial-grade device orchestration**: Architected central control for 10,000+ square meter exhibition spaces and 100+ devices, covering clock synchronization, TCP/IP and serial communication, synchronized scheduling, and disaster recovery.
        - **Frontend & cross-platform development**: Skilled with JavaScript/TypeScript, Vue 3, Blazor Server/WASM, THREE.JS 3D scene rendering, UNI-APP mini programs, and MAUI cross-platform desktop applications.
        - **Embedded & robotics systems**: Arduino/ESP32 hardware drivers, 3D printing, and microcomputer control for distributed modular collaboration and automation.
        - **DevOps & continuous delivery**: GitHub Actions CI/CD, Docker/Kubernetes deployments, Selenium WebDriver E2E testing, and automated NuGet publishing pipelines.
      ja: |-
        - **.NET エコシステムの深い実践**：.NET 6/7/8/9/10、ABP Framework（DDD レイヤリング、マルチテナント、権限管理）、EF Core に精通し、マイクロサービスアーキテクチャとモジュール化アプリケーション開発を主導。
        - **NuGet SDK 開発**：クラウドサービス、AI モデル、大規模データ解析向けの .NET SDK を独立して設計・公開。依存性注入、非同期優先 API、マルチターゲット、複数言語ドキュメントを重視。
        - **AI/LLM 連携**：DashScope.Net、CloudflareAI.DotNet などの SDK を開発。dify と Ollama ローカル LLM を連携し、無人ライブ配信の対話、コンテンツ生成、コメント意味理解に活用。
        - **分散・高並行処理**：大規模データ収集、高並行分散クローリング、Common Crawl 解析、MongoDB/Elasticsearch によるミリオンスケール検索、非同期パイプライン、ETL、集計分析。
        - **産業レベルの設備連動**：1 万平方メートル超の展示空間と 100 台以上の設備を対象に、時刻同期、TCP/IP・シリアル通信、同期スケジューリング、障害復旧を含む中控システムを設計。
        - **フロントエンド・クロスプラットフォーム**：JavaScript/TypeScript、Vue 3、Blazor Server/WASM、THREE.JS、UNI-APP、MAUI に対応。
        - **組込み・ロボティクス**：Arduino/ESP32、3D プリント、マイコン制御を組み合わせた分散モジュール協調と自動化。
        - **DevOps・継続的デリバリー**：GitHub Actions CI/CD、Docker/Kubernetes、Selenium WebDriver E2E テスト、NuGet 自動公開パイプライン。
      fr: |-
        - **Pratique approfondie de l'écosystème .NET** : maîtrise de .NET 6/7/8/9/10, ABP Framework (DDD, multi-tenant, permissions) et EF Core ; pilotage d'architectures microservices et d'applications modulaires.
        - **Développement de SDK NuGet** : conception et publication de SDK .NET de niveau production pour les services cloud, les modèles IA et l'analyse de données massives, avec injection de dépendances, API asynchrones, multi-ciblage et documentation multilingue.
        - **Intégration IA et LLM** : auteur de DashScope.Net et CloudflareAI.DotNet ; intégration de dify et d'Ollama pour l'interaction intelligente en live-streaming automatisé, la génération de contenu et la compréhension sémantique des messages.
        - **Traitement distribué et haute concurrence** : ingestion de données à grande échelle, crawling distribué, analyse Common Crawl, recherche million-scale avec MongoDB/Elasticsearch, pipelines asynchrones, ETL et analyses agrégées.
        - **Orchestration industrielle d'équipements** : architecture de contrôle central pour des espaces d'exposition de plus de 10 000 m² et plus de 100 équipements, incluant synchronisation horaire, TCP/IP, liaison série, planification synchronisée et reprise sur incident.
        - **Frontend et multiplateforme** : JavaScript/TypeScript, Vue 3, Blazor Server/WASM, rendu 3D avec THREE.JS, mini-programmes UNI-APP et applications desktop MAUI.
        - **Systèmes embarqués et robotique** : pilotes Arduino/ESP32, impression 3D et contrôle par micro-ordinateur pour collaboration modulaire distribuée et automatisation.
        - **DevOps et livraison continue** : GitHub Actions CI/CD, Docker/Kubernetes, tests E2E Selenium WebDriver et pipelines de publication NuGet automatisés.

